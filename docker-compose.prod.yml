# ================================================================
# Terra Pravah - Production Docker Compose Override
# ================================================================
# 
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# ================================================================

version: '3.8'

services:
  backend:
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-terrapravah}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-terrapravah}
      - REDIS_URL=redis://redis:6379/0
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-5000}
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  frontend:
    environment:
      - NODE_ENV=production
      - VITE_API_URL=/api
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  postgres:
    profiles: []  # Enable in production
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  nginx:
    profiles: []  # Enable in production
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  celery-worker:
    profiles: []  # Enable in production
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-terrapravah}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-terrapravah}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 4G

  celery-beat:
    profiles: []  # Enable in production
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-terrapravah}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-terrapravah}
