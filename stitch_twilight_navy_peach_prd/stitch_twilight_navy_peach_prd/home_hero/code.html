<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Terra Pravah</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e98963",
                        "background-light": "#f8f6f6",
                        "background-dark": "#211611",
                        "surface": "#212C43",
                        "text-main": "#121826",
                        "muted": "#829AB1"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .nav-link {
            position: relative;
            text-decoration: none;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: #e98963;
            transition: width 0.3s ease;
        }
        
        .nav-link:hover::after {
            width: 100%;
        }

        .topo-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawPath 1.5s ease-out forwards;
        }

        @keyframes drawPath {
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-text-main font-display antialiased min-h-screen flex flex-col">
<!-- Fixed Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-[#F7F3EB] border-b border-muted/30">
<div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
<!-- Logo -->
<div class="flex items-center gap-3">
<div class="text-primary">
<svg fill="none" height="24" viewbox="0 0 48 48" width="24" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M24 4H42V17.3333V30.6667H24V44H6V30.6667V17.3333H24V4Z" fill="currentColor" fill-rule="evenodd"></path>
</svg>
</div>
<span class="text-xl font-bold tracking-tight text-text-main">Terra Pravah</span>
</div>
<!-- Nav Links -->
<nav class="hidden md:flex items-center gap-8">
<a class="nav-link text-sm font-medium text-text-main hover:text-primary transition-colors" href="#">Mission</a>
<a class="nav-link text-sm font-medium text-text-main hover:text-primary transition-colors" href="#">Solutions</a>
<a class="nav-link text-sm font-medium text-text-main hover:text-primary transition-colors" href="#">Cases</a>
</nav>
<!-- Mobile Menu Placeholder -->
<button aria-label="Menu" class="md:hidden text-text-main">
<span class="material-symbols-outlined">menu</span>
</button>
</div>
</header>
<!-- Hero Section -->
<main class="flex-grow flex items-center pt-20">
<div class="max-w-7xl mx-auto w-full px-6 py-12 md:py-24 grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-8 items-center">
<!-- Left: Typography & CTA (60%) -->
<div class="lg:col-span-7 flex flex-col gap-8 lg:pr-12">
<h1 class="text-5xl md:text-6xl lg:text-[72px] font-black leading-[1.1] tracking-[-0.03em] text-text-main">
                    Precision in <br class="hidden lg:block"/> Planetary Scale.
                </h1>
<p class="text-lg md:text-xl text-muted max-w-2xl font-normal leading-relaxed">
                    Translating complex climate solutions into accessible, premium offerings for enterprise and global sustainability leaders.
                </p>
<div class="pt-4">
<button class="bg-primary hover:bg-[#D69176] text-[#121826] font-bold text-base px-8 py-4 rounded-sm transition-all duration-200 cursor-crosshair flex items-center gap-2 group">
<span>Request Access</span>
<span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
<!-- Right: Abstract Visualization (40%) -->
<div class="lg:col-span-5 relative h-[400px] lg:h-[600px] w-full flex items-center justify-center bg-[#F7F3EB]/50 rounded-xl overflow-hidden border border-muted/10">
<!-- Abstract Topological Map SVG -->
<svg aria-label="Abstract topological map animation" class="w-full h-full opacity-80" data-alt="Abstract topological lines animating" viewbox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<g class="text-primary/40" fill="none" stroke="currentColor" stroke-width="1.5">
<path class="topo-path" d="M -50 250 Q 150 100, 250 250 T 550 250"></path>
<path class="topo-path" d="M -50 300 Q 150 150, 250 300 T 550 300" style="animation-delay: 0.2s;"></path>
<path class="topo-path" d="M -50 200 Q 150 50, 250 200 T 550 200" style="animation-delay: 0.1s;"></path>
<path class="topo-path" d="M -50 350 Q 150 200, 250 350 T 550 350" style="animation-delay: 0.3s;"></path>
<path class="topo-path" d="M -50 150 Q 150 0, 250 150 T 550 150" style="animation-delay: 0.4s;"></path>
<circle class="animate-pulse" cx="250" cy="250" fill="#e98963" r="4" stroke="none"></circle>
<circle class="animate-pulse" cx="350" cy="180" fill="#e98963" r="3" stroke="none" style="animation-delay: 0.5s;"></circle>
<circle class="animate-pulse" cx="150" cy="320" fill="#e98963" r="2" stroke="none" style="animation-delay: 0.8s;"></circle>
</g>
</svg>
</div>
</div>
</main>
</body></html>
